<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collectifs en lutte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,700&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════
       VARIABLES & RESET
    ══════════════════════════════════════════ */
    :root {
      --r:    #d62828;
      --r2:   #f94040;
      --noir: #0e0e0e;
      --s1:   #161616;
      --s2:   #202020;
      --s3:   #2c2c2c;
      --s4:   #3a3a3a;
      --t1:   #f5ede3;
      --t2:   #c8bfb4;
      --t3:   #7a7065;
      --max:  960px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--noir);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════════════════
       HEADER STICKY — bouton retour ici
    ══════════════════════════════════════════ */
    #header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(14,14,14,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--s3);
    }
    .header-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 54px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    /* Bouton retour — toujours dans le header */
    #btn-retour {
      display: none;
      align-items: center;
      gap: 6px;
      background: var(--s2);
      border: 1px solid var(--s4);
      color: var(--t2);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      padding: 0.35rem 0.9rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      flex-shrink: 0;
      white-space: nowrap;
    }
    #btn-retour:hover { background: var(--r); border-color: var(--r); color: #fff; }
    #btn-retour .arrow { font-size: 0.9rem; transition: transform 0.15s; }
    #btn-retour:hover .arrow { transform: translateX(-3px); }

    /* Logo / titre site */
    .site-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--r2);
      cursor: pointer;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .site-logo:hover { color: var(--t1); }

    /* Séparateur vertical */
    .header-sep {
      width: 1px;
      height: 20px;
      background: var(--s3);
      flex-shrink: 0;
    }

    /* Breadcrumb inline dans le header */
    #breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.04em;
      overflow: hidden;
      flex: 1;
      min-width: 0;
    }
    .bc-item {
      color: var(--t3);
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bc-item:hover { color: var(--r2); }
    .bc-sep { color: var(--s4); flex-shrink: 0; }
    .bc-current { color: var(--t2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ══════════════════════════════════════════
       CONTENU
    ══════════════════════════════════════════ */
    .page-wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
      flex: 1;
      width: 100%;
    }

    .vue { display: none; }
    .vue.active { display: block; animation: fadeUp 0.3s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══════════════════════════════════════════
       PAGE ACCUEIL
    ══════════════════════════════════════════ */
    .hero {
      padding: 3rem 0 3.5rem;
      border-bottom: 1px solid var(--s3);
      margin-bottom: 3rem;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      left: -1.5rem;
      top: 0;
      width: 4px;
      height: 100%;
      background: var(--r);
    }
    .hero-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--r2);
      margin-bottom: 0.8rem;
    }
    .hero-titre {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: clamp(3.5rem, 9vw, 7rem);
      line-height: 0.88;
      letter-spacing: 0.01em;
      text-transform: uppercase;
      color: var(--t1);
      margin-bottom: 1.2rem;
    }
    .hero-titre em {
      font-style: italic;
      color: var(--r);
    }
    .hero-sous {
      font-size: 1rem;
      color: var(--t3);
      font-weight: 400;
      max-width: 440px;
      line-height: 1.6;
    }

    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-label::after { content:''; flex:1; height:1px; background: var(--s3); }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: var(--s3);
      border: 1px solid var(--s3);
    }
    .cat-card {
      background: var(--s1);
      padding: 1.8rem;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
      overflow: hidden;
    }
    .cat-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 3px;
      background: var(--r);
      transition: width 0.25s ease;
    }
    .cat-card:hover { background: var(--s2); }
    .cat-card:hover::after { width: 100%; }
    .cat-card.vide { opacity: 0.4; cursor: default; }
    .cat-card.vide::after { display: none; }
    .cat-card.vide:hover { background: var(--s1); }

    .cat-icone { font-size: 1.8rem; margin-bottom: 1rem; display: block; }
    .cat-nom {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--t1);
      margin-bottom: 0.35rem;
      line-height: 1;
    }
    .cat-desc {
      font-size: 0.82rem;
      color: var(--t3);
      line-height: 1.5;
      margin-bottom: 0.8rem;
    }
    .cat-badge {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.06em;
      padding: 3px 8px;
      background: var(--s3);
      color: var(--t3);
    }
    .cat-badge.actif { background: #2a0d0d; color: var(--r2); }

    /* ══════════════════════════════════════════
       PAGE VILLES
    ══════════════════════════════════════════ */
    .vue-header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--s3);
    }
    .vue-titre {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 6vw, 4rem);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: var(--t1);
      line-height: 1;
      margin-bottom: 0.4rem;
    }
    .vue-sous {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--r2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .region-bloc { margin-bottom: 2rem; }
    .region-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .region-label::after { content:''; flex:1; height:1px; background: var(--s2); }

    .villes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 6px;
    }
    .ville-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 0.9rem;
      background: var(--s1);
      border: 1px solid var(--s2);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .ville-btn:hover { background: var(--s2); border-color: var(--r); }
    .ville-btn.vide { opacity: 0.3; cursor: default; }
    .ville-btn.vide:hover { background: var(--s1); border-color: var(--s2); }
    .ville-btn.all {
      border-color: var(--r);
      background: #1a0a0a;
      grid-column: 1 / -1;
    }
    .ville-btn.all:hover { background: #2a0e0e; }
    .ville-nom {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--t1);
    }
    .ville-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--r2);
      background: #2a0d0d;
      padding: 2px 6px;
    }
    .ville-count.zero { color: var(--t3); background: var(--s2); }

    /* ══════════════════════════════════════════
       LISTE COLLECTIFS
    ══════════════════════════════════════════ */
    .collectifs-list { display: flex; flex-direction: column; gap: 6px; }
    .coll-row {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1rem 1.2rem;
      background: var(--s1);
      border: 1px solid var(--s2);
      border-left: 3px solid var(--r);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .coll-row:hover { background: var(--s2); border-color: var(--r2); }
    .coll-logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
      background: var(--s2);
      padding: 6px;
      flex-shrink: 0;
    }
    .coll-infos { flex: 1; min-width: 0; }
    .coll-nom {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--t1);
      margin-bottom: 0.2rem;
      line-height: 1.1;
    }
    .coll-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: var(--t3);
      letter-spacing: 0.04em;
    }
    .coll-arrow {
      font-size: 1.1rem;
      color: var(--s4);
      transition: color 0.15s, transform 0.15s;
      flex-shrink: 0;
    }
    .coll-row:hover .coll-arrow { color: var(--r2); transform: translateX(4px); }

    /* ══════════════════════════════════════════
       FICHE COLLECTIF
    ══════════════════════════════════════════ */
    .fiche-hero {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 2rem;
      align-items: center;
      padding: 2rem;
      background: var(--s1);
      border: 1px solid var(--s2);
      border-top: 3px solid var(--r);
      margin-bottom: 1rem;
    }
    .fiche-logo {
      width: 140px;
      height: 140px;
      object-fit: contain;
      background: var(--s2);
      padding: 12px;
    }
    .fiche-ville-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--r2);
      margin-bottom: 0.6rem;
    }
    .fiche-titre {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      line-height: 1;
      color: var(--t1);
      margin-bottom: 0.5rem;
    }
    .fiche-tagline {
      font-size: 0.9rem;
      color: var(--t3);
      line-height: 1.5;
    }

    .fiche-bloc {
      background: var(--s1);
      border: 1px solid var(--s2);
      padding: 1.5rem 1.8rem;
      margin-bottom: 1rem;
    }
    .fiche-bloc-titre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .fiche-bloc-titre::after { content:''; flex:1; height:1px; background: var(--s3); }
    .fiche-bloc p {
      font-size: 0.95rem;
      line-height: 1.75;
      color: var(--t2);
      margin-bottom: 0.6rem;
    }
    .fiche-bloc p:last-child { margin-bottom: 0; }

    .lien-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0.55rem 1.1rem;
      background: var(--s2);
      border: 1px solid var(--s3);
      color: var(--t1);
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .lien-btn:hover { background: var(--r); border-color: var(--r); color: #fff; }

    /* ══════════════════════════════════════════
       FOOTER
    ══════════════════════════════════════════ */
    footer {
      border-top: 1px solid var(--s2);
      padding: 1.2rem 1.5rem;
    }
    .footer-inner {
      max-width: var(--max);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .footer-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--r);
    }
    footer p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--s4);
      letter-spacing: 0.05em;
    }

    /* ══════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════ */
    @media (max-width: 640px) {
      .categories-grid { grid-template-columns: 1fr; }
      .fiche-hero { grid-template-columns: 1fr; text-align: center; }
      .fiche-logo { width: 100px; height: 100px; margin: 0 auto; }
      #breadcrumb { display: none; }
    }
  </style>
</head>
<body>

<!-- ░░ HEADER ░░ -->
<div id="header">
  <div class="header-inner">
    <button id="btn-retour" onclick="navBack()">
      <span class="arrow">←</span> Retour
    </button>
    <div class="header-sep" id="header-sep" style="display:none"></div>
    <span class="site-logo" onclick="goTo('accueil')">✊ Collectifs en lutte</span>
    <div class="header-sep"></div>
    <div id="breadcrumb"></div>
  </div>
</div>

<!-- ░░ CONTENU ░░ -->
<div class="page-wrap">

  <!-- ACCUEIL -->
  <div class="vue" id="vue-accueil">
    <div class="hero">
      <p class="hero-eyebrow">France — réseau de groupes organisés</p>
      <h1 class="hero-titre">Collectifs<br><em>en lutte</em></h1>
      <p class="hero-sous">Retrouvez les collectifs antifascistes, écologistes et médias engagés organisés par ville et région.</p>
    </div>
    <p class="section-label">Choisir une catégorie</p>
    <div class="categories-grid" id="categories-grid"></div>
  </div>

  <!-- VILLES -->
  <div class="vue" id="vue-villes">
    <div class="vue-header">
      <h2 class="vue-titre" id="villes-titre"></h2>
      <p class="vue-sous" id="villes-sous"></p>
    </div>
    <div id="villes-container"></div>
  </div>

  <!-- LISTE -->
  <div class="vue" id="vue-liste">
    <div class="vue-header">
      <h2 class="vue-titre" id="liste-titre"></h2>
      <p class="vue-sous" id="liste-sous"></p>
    </div>
    <div class="collectifs-list" id="collectifs-list"></div>
  </div>

  <!-- FICHE -->
  <div class="vue" id="vue-fiche">
    <div class="fiche-hero">
      <img id="f-logo" class="fiche-logo" src="" alt="">
      <div>
        <div class="fiche-ville-badge" id="f-ville-badge"></div>
        <div class="fiche-titre" id="f-titre"></div>
        <div class="fiche-tagline" id="f-tagline"></div>
      </div>
    </div>
    <div class="fiche-bloc" id="f-description"></div>
    <div class="fiche-bloc">
      <div class="fiche-bloc-titre">Contacts & Liens</div>
      <div id="f-liens"></div>
    </div>
  </div>

</div>

<!-- ░░ FOOTER ░░ -->
<footer>
  <div class="footer-inner">
    <span class="footer-logo">✊ Collectifs en lutte</span>
    <p>Réseau de groupes organisés — France</p>
  </div>
</footer>

<script>
/* ============================================================
   ▌▌▌ DONNÉES — MODIFIER ICI ▌▌▌
   ============================================================

   CATÉGORIES — ne pas changer les id :
     "antifasciste" | "ecologiste" | "national" | "media"

   AJOUTER UN COLLECTIF — copier ce modèle et remplir :
   {
     id: "identifiant-unique",     // utilisé dans l'URL ?id=...
     categorie: "antifasciste",
     ville: "Paris",               // doit correspondre à un nom dans VILLES
     logo: "https://...",
     titre: "Nom du collectif",
     tagline: "Phrase courte",
     description: `
       <h3>À propos</h3>
       <p>Texte...</p>
     `,
     liens: [
       { href: "https://instagram.com/...", text: "Instagram ↗" }
     ]
   },

   AJOUTER UNE VILLE — ajouter son nom dans VILLES
   et dans la bonne région dans REGIONS.
   ============================================================ */

const DATA = {

  categories: [
    { id: "antifasciste",  nom: "Antifascistes",           icone: "✊", description: "Groupes de lutte contre l'extrême droite" },
    { id: "ecologiste",    nom: "Écologistes",              icone: "🌱", description: "Mobilisation pour l'urgence climatique" },
    { id: "national",      nom: "Mouvements nationaux",     icone: "🏴", description: "Organisations à échelle nationale" },
    { id: "media",         nom: "Presse & médias engagés",  icone: "📰", description: "Médias indépendants et engagés" }
  ],

  villes: [
    "Paris", "Seine-Saint-Denis", "Val-de-Marne", "Hauts-de-Seine",
    "Lille", "Amiens", "Reims", "Rouen", "Caen",
    "Strasbourg", "Metz", "Nancy", "Mulhouse",
    "Rennes", "Nantes", "Le Mans", "Brest", "Lorient",
    "Tours", "Orléans", "Clermont-Ferrand", "Limoges",
    "Bordeaux", "Toulouse", "Montpellier", "Nîmes", "Perpignan", "Bayonne",
    "Marseille", "Lyon", "Nice", "Grenoble", "Toulon", "Avignon", "Aix-en-Provence",
    "Dijon", "Besançon",
    "National / France entière"
  ],

  collectifs: [

    // ── ANTIFASCISTES / Paris ──────────────────
    {
      id: "afaparisbanlieue",
      categorie: "antifasciste",
      ville: "Paris",
      logo: "https://github.com/feygus/image-map/raw/main/Logo%20AFA%20PB.jpg",
      titre: "Action Antifasciste Paris Banlieue",
      tagline: "Collectif actif en Île‑de‑France",
      description: `
        <div class="fiche-bloc-titre">À propos</div>
        <p>Action Antifasciste Paris Banlieue est un collectif qui lutte contre l'extrême droite.</p>
        <p>Nous organisons des actions, des réunions et des événements de sensibilisation.</p>
      `,
      liens: [
        { href: "https://www.instagram.com/afaparisbanlieue/", text: "Instagram ↗" },
        { href: "mailto:contact@afaparisbanlieue.org", text: "Email ↗" }
      ]
    },
    {
      id: "antifaparis20",
      categorie: "antifasciste",
      ville: "Paris",
      logo: "https://github.com/feygus/image-map/raw/main/Logo%20Antifasciste%20Paris%2020e.jpg",
      titre: "Antifasciste Paris 20e",
      tagline: "Collectif local du 20e arrondissement",
      description: `<div class="fiche-bloc-titre">À propos</div><p>Description à compléter.</p>`,
      liens: [{ href: "https://www.instagram.com/antifaparis20/", text: "Instagram ↗" }]
    },
    {
      id: "youngstruggleparis",
      categorie: "antifasciste",
      ville: "Paris",
      logo: "https://github.com/feygus/image-map/raw/main/Logo%20Young%20Struggle%20Paris.jpg",
      titre: "Young Struggle Paris",
      tagline: "Jeunes antifascistes parisiens",
      description: `<div class="fiche-bloc-titre">À propos</div><p>Description à compléter.</p>`,
      liens: [{ href: "https://www.instagram.com/youngstruggleparis/", text: "Instagram ↗" }]
    },
    {
      id: "comitedesoutien_paris",
      categorie: "antifasciste",

// Groupements géographiques pour la vue villes
const REGIONS = [
  { label: "Île-de-France",             villes: ["Paris", "Seine-Saint-Denis", "Val-de-Marne", "Hauts-de-Seine"] },
  { label: "Nord / Normandie",          villes: ["Lille", "Amiens", "Reims", "Rouen", "Caen"] },
  { label: "Grand Est",                 villes: ["Strasbourg", "Metz", "Nancy", "Mulhouse"] },
  { label: "Bretagne / Pays de la Loire", villes: ["Rennes", "Nantes", "Le Mans", "Brest", "Lorient"] },
  { label: "Centre",                    villes: ["Tours", "Orléans", "Clermont-Ferrand", "Limoges"] },
  { label: "Sud-Ouest",                 villes: ["Bordeaux", "Toulouse", "Montpellier", "Nîmes", "Perpignan", "Bayonne"] },
  { label: "Sud-Est",                   villes: ["Marseille", "Lyon", "Nice", "Grenoble", "Toulon", "Avignon", "Aix-en-Provence"] },
  { label: "Est",                       villes: ["Dijon", "Besançon"] },
  { label: "National",                  villes: ["National / France entière"] }
];

/* ============================================================
   ▌▌▌ MOTEUR — NE PAS MODIFIER ▌▌▌
   ============================================================ */
let state = { vue: 'accueil', categorie: null, ville: null, collectif: null };
const navStack = [];

function goTo(vue, params = {}) {
  navStack.push({ ...state });
  state = { vue, ...params };
  render();
}
function navBack() {
  if (navStack.length > 0) { state = navStack.pop(); render(); }
}

function render() {
  // Vues
  document.querySelectorAll('.vue').forEach(v => { v.classList.remove('active'); v.style.display = 'none'; });
  const el = document.getElementById('vue-' + state.vue);
  el.style.display = 'block';
  void el.offsetWidth;
  el.classList.add('active');

  // Bouton retour + séparateur
  const btnRetour = document.getElementById('btn-retour');
  const sep = document.getElementById('header-sep');
  const hasBack = navStack.length > 0;
  btnRetour.style.display = hasBack ? 'inline-flex' : 'none';
  if (sep) sep.style.display = hasBack ? 'block' : 'none';

  renderBreadcrumb();

  if (state.vue === 'accueil') renderAccueil();
  if (state.vue === 'villes')  renderVilles();
  if (state.vue === 'liste')   renderListe();
  if (state.vue === 'fiche')   renderFiche();

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const parts = [];
  if (state.vue !== 'accueil') {
    parts.push(`<span class="bc-item" onclick="goTo('accueil')">Accueil</span>`);
  }
  if (state.categorie) {
    const cat = DATA.categories.find(c => c.id === state.categorie);
    if (state.vue === 'villes') {
      parts.push(`<span class="bc-sep">›</span><span class="bc-current">${cat.nom}</span>`);
    } else {
      parts.push(`<span class="bc-sep">›</span><span class="bc-item" onclick="goTo('villes',{categorie:'${cat.id}'})">${cat.nom}</span>`);
    }
  }
  if (state.ville) {
    if (state.vue === 'liste') {
      parts.push(`<span class="bc-sep">›</span><span class="bc-current">${state.ville}</span>`);
    } else if (state.vue === 'fiche') {
      parts.push(`<span class="bc-sep">›</span><span class="bc-item" onclick="goTo('liste',{categorie:'${state.categorie}',ville:'${state.ville}'})">${state.ville}</span>`);
    }
  }
  if (state.vue === 'fiche' && state.collectif) {
    const c = DATA.collectifs.find(x => x.id === state.collectif);
    parts.push(`<span class="bc-sep">›</span><span class="bc-current">${c.titre}</span>`);
  }
  bc.innerHTML = parts.join('');
}

function renderAccueil() {
  const grid = document.getElementById('categories-grid');
  grid.innerHTML = '';
  DATA.categories.forEach((cat, i) => {
    const count = DATA.collectifs.filter(c => c.categorie === cat.id).length;
    const card = document.createElement('div');
    card.className = 'cat-card' + (count === 0 ? ' vide' : '');
    card.style.animationDelay = (i * 0.07) + 's';
    card.innerHTML = `
      <span class="cat-icone">${cat.icone}</span>
      <div class="cat-nom">${cat.nom}</div>
      <div class="cat-desc">${cat.description}</div>
      <span class="cat-badge ${count > 0 ? 'actif' : ''}">${count === 0 ? 'À venir' : count + ' collectif' + (count > 1 ? 's' : '')}</span>`;
    if (count > 0) card.onclick = () => goTo('villes', { categorie: cat.id });
    grid.appendChild(card);
  });
}

function renderVilles() {
  const cat = DATA.categories.find(c => c.id === state.categorie);
  document.getElementById('villes-titre').textContent = cat.nom;
  document.getElementById('villes-sous').textContent = cat.description;

  const cCat = DATA.collectifs.filter(c => c.categorie === state.categorie);
  const villesActives = new Set(cCat.map(c => c.ville));
  const container = document.getElementById('villes-container');
  container.innerHTML = '';

  if (villesActives.size > 1) {
    const allGrid = document.createElement('div');
    allGrid.className = 'villes-grid';
    allGrid.style.marginBottom = '1.5rem';
    const allBtn = document.createElement('div');
    allBtn.className = 'ville-btn all';
    allBtn.innerHTML = `<span class="ville-nom">Tous les collectifs</span><span class="ville-count">${cCat.length}</span>`;
    allBtn.onclick = () => goTo('liste', { categorie: state.categorie, ville: null });
    allGrid.appendChild(allBtn);
    container.appendChild(allGrid);
  }

  REGIONS.forEach(region => {
    const villesRegion = region.villes.filter(v => DATA.villes.includes(v));
    if (!villesRegion.length) return;
    const bloc = document.createElement('div');
    bloc.className = 'region-bloc';
    bloc.innerHTML = `<div class="region-label">${region.label}</div>`;
    const grid = document.createElement('div');
    grid.className = 'villes-grid';
    villesRegion.forEach(ville => {
      const count = cCat.filter(c => c.ville === ville).length;
      const btn = document.createElement('div');
      btn.className = 'ville-btn' + (count === 0 ? ' vide' : '');
      btn.innerHTML = `<span class="ville-nom">${ville}</span><span class="ville-count ${count === 0 ? 'zero' : ''}">${count}</span>`;
      if (count > 0) btn.onclick = () => goTo('liste', { categorie: state.categorie, ville });
      grid.appendChild(btn);
    });
    bloc.appendChild(grid);
    container.appendChild(bloc);
  });
}

function renderListe() {
  const cat = DATA.categories.find(c => c.id === state.categorie);
  const collectifs = DATA.collectifs.filter(c =>
    c.categorie === state.categorie && (state.ville === null || c.ville === state.ville)
  );
  document.getElementById('liste-titre').textContent = state.ville || cat.nom;
  document.getElementById('liste-sous').textContent = `${collectifs.length} collectif${collectifs.length > 1 ? 's' : ''}`;
  const list = document.getElementById('collectifs-list');
  list.innerHTML = '';
  collectifs.forEach((c, i) => {
    const row = document.createElement('div');
    row.className = 'coll-row';
    row.style.animationDelay = (i * 0.04) + 's';
    row.innerHTML = `
      <img class="coll-logo" src="${c.logo}" alt="${c.titre}">
      <div class="coll-infos">
        <div class="coll-nom">${c.titre}</div>
        <div class="coll-tag">${c.tagline}</div>
      </div>
      <span class="coll-arrow">→</span>`;
    row.onclick = () => goTo('fiche', { categorie: state.categorie, ville: state.ville, collectif: c.id });
    list.appendChild(row);
  });
}

function renderFiche() {
  const c = DATA.collectifs.find(x => x.id === state.collectif);
  document.title = c.titre + ' — Collectifs en lutte';
  document.getElementById('f-logo').src = c.logo;
  document.getElementById('f-logo').alt = c.titre;
  document.getElementById('f-titre').textContent = c.titre;
  document.getElementById('f-tagline').textContent = c.tagline;
  document.getElementById('f-ville-badge').textContent = '📍 ' + c.ville;
  document.getElementById('f-description').innerHTML = c.description;
  const liensDiv = document.getElementById('f-liens');
  liensDiv.innerHTML = '';
  c.liens.forEach(l => { liensDiv.innerHTML += `<a class="lien-btn" target="_blank" href="${l.href}">${l.text}</a>`; });
}

// Lien entrant depuis carte OSM (?id=...)
function init() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (id) {
    const c = DATA.collectifs.find(x => x.id === id);
    if (c) {
      navStack.push({ vue: 'accueil', categorie: null, ville: null, collectif: null });
      navStack.push({ vue: 'villes', categorie: c.categorie, ville: null, collectif: null });
      navStack.push({ vue: 'liste', categorie: c.categorie, ville: c.ville, collectif: null });
      state = { vue: 'fiche', categorie: c.categorie, ville: c.ville, collectif: id };
      render();
      return;
    }
  }
  goTo('accueil');
}

init();
</script>
